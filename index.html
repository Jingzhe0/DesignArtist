<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CYBER ARTIST</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">VOID//ART</div>
  <ul>
    <li>Work</li>
    <li>About</li>
    <li>Community</li>
  </ul>
</nav>

<section class="hero">
  <div class="overlay"></div>
  <h1>ENTER THE VOID</h1>
  <p>Futuristic art & immersive worlds</p>
  <div class="buttons">
    <button class="primary">Explore</button>
    <button class="secondary">Join</button>
  </div>
</section>

<section class="about">
  <div class="text">
    <h2>About</h2>
    <p>Designing cinematic worlds blending art, games, and story.</p>
  </div>
  <div class="image"></div>
</section>

<section class="collection">
  <h2>Collections</h2>
  <div class="grid">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>
</section>

<section class="roadmap">
  <h2>Roadmap</h2>
  <div class="timeline">
    <div class="node">Phase 1</div>
    <div class="node">Phase 2</div>
    <div class="node">Phase 3</div>
  </div>
</section>

<section class="team">
  <h2>Team</h2>
  <div class="members">
    <div class="member"></div>
    <div class="member"></div>
  </div>
</section>

<footer>
  <p>© VOID ART</p>
</footer>

<script src="script.js"></script>
</body>
</html>
